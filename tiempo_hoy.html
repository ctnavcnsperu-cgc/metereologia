<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dashboard Meteorológico - Consola Técnica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'IBM Plex Mono', 'monospace'],
                        technical: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --tech-border: #074e8c;
            --tech-bg: #dbeafe;
            --tech-accent: #074e8c;
        }

        .dark {
            --tech-border: #60a5fa;
            --tech-bg: #0f172a;
            --tech-accent: #38bdf8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--tech-bg);
            transition: all 0.3s ease;
        }

        .tech-grid {
            border: 2px solid var(--tech-border);
        }

        .tech-cell {
            border: 1px solid var(--tech-border);
            padding: 0.35rem 0.5rem;
        }

        .tech-header {
            background: linear-gradient(180deg, #074e8c 0%, #033663 100%);
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .dark {
            background-color: #0f172a !important;
        }

        .dark .tech-header {
            background: linear-gradient(180deg, #1e3a8a 0%, #172554 100%);
            color: #38bdf8;
        }

        #map {
            width: 100%;
            height: 100%;
            border: 1px solid var(--tech-border);
            background: #aad3df;
            /* Leaflet blue */
        }

        .map-wrapper {
            position: sticky;
            top: 2rem;
            height: calc(100vh - 4rem);
        }


        .station-card {
            margin-bottom: 2rem;
            scroll-margin-top: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .station-card.highlight {
            box-shadow: 0 0 20px var(--tech-border);
            outline: 3px solid var(--tech-accent);
        }

        .monospace {
            font-family: 'JetBrains Mono', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin: 4px 0; /* Creates separation from top and bottom */
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(7, 78, 140, 0.3); /* Subtle light mode variant */
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(7, 78, 140, 0.8); /* Brighter on hover in light mode */
        }

        /* Dark Mode Scrollbar Styling */
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3); /* Subtle dark mode variant (tech-accent) */
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.8); /* Brighter dark mode on hover */
        }


        .leaflet-control-layers {
            background: var(--tech-bg) !important;
            border: 2px solid var(--tech-border) !important;
            border-radius: 0 !important;
        }

        /* Minimalist ICAO Markers */
        .icao-marker {
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .icao-marker .plane-radar-ring {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .icao-marker .plane-icon {
            width: 21px;
            height: 21px;
            fill: #FFFF00;
            stroke: #1a1a1a;
            stroke-width: 1.5px;
            stroke-linejoin: round;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.8));
        }

        .icao-marker .label {
            color: #FFFF00;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 900;
            margin-left: 1px;
            text-shadow: 
                2px 2px 0px #000,
                -1px -1px 0px #000,
                1px -1px 0px #000,
                -1px 1px 0px #000,
                0px 0px 4px rgba(0,0,0,1);
            letter-spacing: 0.5px;
        }

        /* Mantener el mapa satélite con su estilo original (blanco con borde) */
        .sat-active .icao-marker .label {
            color: #ffffff !important;
            text-shadow:
                -1.5px -1.5px 0 #000,
                1.5px -1.5px 0 #000,
                -1.5px 1.5px 0 #000,
                1.5px 1.5px 0 #000,
                0 0 4px #000 !important;
        }

        .dark .icao-marker .plane-radar-ring {
            background-color: transparent;
            border: none;
        }

        .icao-marker:hover .label {
            color: #ffff00;
            transform: scale(1.1);
            transition: all 0.2s ease;
        }

        /* Weather Animations */
        @keyframes sun-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes sun-glow {
            0% {
                filter: drop-shadow(0 0 2px #ffd700);
            }

            50% {
                filter: drop-shadow(0 0 10px #ffae00);
            }

            100% {
                filter: drop-shadow(0 0 2px #ffd700);
            }
        }

        .sun-animation {
            display: inline-block;
            animation: sun-spin 20s linear infinite, sun-glow 3s ease-in-out infinite;
        }

        @keyframes rain-drop {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(3px);
            }

            100% {
                transform: translateY(0);
            }
        }

        .rain-animation {
            display: inline-block;
            animation: rain-drop 0.8s ease-in-out infinite;
        }

        @keyframes storm-flash {

            0%,
            90% {
                filter: brightness(1);
            }

            92% {
                filter: brightness(3) drop-shadow(0 0 10px white);
            }

            94% {
                filter: brightness(1);
            }

            96% {
                filter: brightness(3) drop-shadow(0 0 10px white);
            }

            98%,
            100% {
                filter: brightness(1);
            }
        }

        .storm-animation {
            display: inline-block;
            animation: storm-flash 4s step-end infinite;
        }

        @keyframes cloud-float {
            0% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(4px, -2px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .cloud-animation {
            display: inline-block;
            animation: cloud-float 5s ease-in-out infinite;
        }

        @keyframes fog-drift {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .fog-animation {
            display: inline-block;
            animation: fog-drift 4s ease-in-out infinite;
        }

        /* Map Controls Custom Styling */
        .leaflet-control-layers {
            background: var(--tech-bg) !important;
            border: 2px solid var(--tech-border) !important;
            color: currentColor !important;
            font-family: 'JetBrains Mono', monospace !important;
            border-radius: 0 !important;
            font-size: 10px !important;
            font-weight: bold !important;
            padding: 5px !important;
        }

        .leaflet-bar a {
            background-color: var(--tech-bg) !important;
            color: var(--tech-border) !important;
            border-bottom: 1px solid var(--tech-border) !important;
            border-radius: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 30px !important;
            height: 30px !important;
            line-height: 30px !important;
        }

        .leaflet-bar a:hover {
            background-color: var(--tech-accent) !important;
            color: white !important;
        }

        .map-home-btn {
            font-size: 16px !important;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--tech-border);
            background-color: transparent;
            color: var(--tech-border);
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-btn:hover {
            background-color: var(--tech-border);
            color: #ffffff !important;
        }

        .nav-btn.active {
            background-color: var(--tech-border);
            color: #ffffff !important;
        }

        .nav-btn svg {
            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
        }

        .nav-btn span {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        /* Menu Dropdown Styles */
        .nav-dropdown {
            position: relative;
            display: inline-block;
        }

        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--tech-bg);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 10000;
            border: 2px solid var(--tech-border);
            margin-top: 2px;
        }

        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }

        .nav-dropdown-item {
            color: var(--tech-border);
            padding: 8px 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .nav-dropdown-item:hover {
            background-color: var(--tech-border);
            color: white !important;
        }

        .dark .nav-dropdown-content {
            background-color: #0f172a;
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 text-slate-900 dark:text-slate-200">

    <div class="max-w-[1800px] mx-auto">
        <header class="flex justify-between items-end mb-8">
            <div class="flex items-center gap-4">
                <div class="text-blue-900 dark:text-sky-400">
                    <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 7 9 3 5 7l4 4Z" />
                        <path d="m17 11 4 4-4 4-4-4Z" />
                        <path d="m4.5 15.5 2 2" />
                        <path d="m15.5 4.5 2 2" />
                        <path d="M2 22 9.1 14.9" />
                        <path d="M14.9 9.1 22 2" />
                        <circle cx="12" cy="12" r="2" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black uppercase tracking-tighter">ESTADO DEL TIEMPO</h1>
                    <p class="text-sm font-bold opacity-80 uppercase">AEROPUERTOS DEL PERÚ</p>
                </div>
            </div>

            <!-- Menú de Navegación -->
            <nav class="flex flex-wrap gap-2">
                <a href="index.html" class="nav-btn" title="Estado del Tiempo Hoy">
                    
                    <span>Tiempo Hoy</span>
                </a>
                <div class="nav-dropdown">
                    <button class="nav-btn active" title="Dashboard Principal">
                        <span>TIEMPO AEROPUERTOS</span>
                        <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div class="nav-dropdown-content">
                        <a href="tiempo_hoy.html" class="nav-dropdown-item">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                            <span>METAR</span>
                        </a>
                        <a href="taf.html" class="nav-dropdown-item">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span>TAF</span>
                        </a>
                    </div>
                </div>
                <a href="panel_alerta.html" class="nav-btn" title="Sistema de Alerta">
                    
                    <span>REGLAS DE VUELO</span>
                </a>
                <a href="panel_tecnico.html" class="nav-btn" title="Navegación Técnica">
                    
                    <span>RADAR NAVEGACIÓN</span>
                </a>
                <a href="tiempo_aeropuertos.html" class="nav-btn" title="Reporte Técnico">
                    
                    <span>REPORTE</span>
                </a>
            </nav>

            <div class="text-right monospace">
                <p class="text-xs font-bold uppercase">Sincronización</p>
                <p class="text-xl font-bold">17/04/2026 11:55</p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/2 lg:block">
                <div class="map-wrapper">
                    <div id="map" class="rounded-sm"></div>
                </div>
            </div>

            <div id="cards-container"
                class="w-full lg:w-1/2 h-[calc(100vh-4rem)] overflow-y-auto pr-4 custom-scrollbar scroll-smooth">
                
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const airports = [
            
        ];

        // Expanded bounds to allow tiles to fill the DIV aspect ratio
        const peruBounds = [
            [-30.0, -100.0], // SW
            [10.0, -50.0]    // NE
        ];

        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap',
            noWrap: true
        });

        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri',
            noWrap: true
        });

        const map = L.map('map', {
            center: [-9.19, -75.01],
            zoom: 6,
            minZoom: 5,
            maxZoom: 12,
            maxBounds: peruBounds,
            maxBoundsViscosity: 1.0,
            layers: [osm]
        });

        const baseMaps = {
            "Navegación": osm,
            "Satélite": satellite
        };

        L.control.layers(baseMaps, null, { collapsed: true, position: 'topright' }).addTo(map);

        // Control dinámico de color para la capa de satélite
        map.on('baselayerchange', function (e) {
            const mapEl = document.getElementById('map');
            if (e.name === "Satélite") {
                mapEl.classList.add('sat-active');
            } else {
                mapEl.classList.remove('sat-active');
            }
        });

        // PE Centering Button
        const homeControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                const btn = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                btn.innerHTML = '<a href="#" title="Reset View" class="map-home-btn">🎯</a>';
                btn.onclick = function (e) {
                    e.preventDefault();
                    map.fitBounds([[-18.5, -81.5], [0.0, -68.5]]);
                };
                return btn;
            }
        });
        map.addControl(new homeControl());


        const markers = {};
        airports.forEach(air => {
            if (air.lat && air.lon && parseFloat(air.lat) !== 0) {
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="icao-marker"><div class="plane-radar-ring"><svg viewBox="0 0 24 24" class="plane-icon" xmlns="http://www.w3.org/2000/svg"><path d="M21 16v-2l-8-5V3.5C13 2.67 12.33 2 11.5 2S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5L21 16z"/></svg></div><div class="label">${air.icao}</div></div>`,
                    iconSize: [100, 20],
                    iconAnchor: [4, 10]
                });
                const marker = L.marker([air.lat, air.lon], { icon: customIcon }).addTo(map);
                marker.bindPopup(`<b>${air.icao}</b><br>${air.nombre}<br>${air.temp}`);
                marker.on('click', () => {
                    const card = document.getElementById(`card-${air.icao}`);
                    if (card) {
                        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('highlight'));
                        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        card.classList.add('highlight');
                        setTimeout(() => card.classList.remove('highlight'), 3000);
                    }
                });
                markers[air.icao] = marker;
            }
        });

        // Function to zoom directly to an airport when clicking on its card
        function zoomToAirport(icao) {
            const marker = markers[icao];
            if (marker) {
                // maxZoom is 12 according to map initialization
                map.flyTo(marker.getLatLng(), 12, {
                    animate: true,
                    duration: 1.5
                });
                marker.openPopup();
                
                // Temporary visual highlight on the marker icon
                const icon = marker.getElement();
                if (icon) {
                    icon.style.filter = 'drop-shadow(0 0 15px yellow) brightness(1.2)';
                    setTimeout(() => {
                        icon.style.filter = '';
                    }, 3000);
                }
            }
        }

        // Initialize view
        setTimeout(() => {
            map.invalidateSize();
            map.fitBounds([[-18.5, -81.5], [0.0, -68.5]]);
        }, 300);
    </script>
</body>

</html>
