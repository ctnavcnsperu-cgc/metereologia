        :root {
            --tech-border: #074e8c;
            --tech-bg: #DBEAFE;
            --tech-accent: #074e8c;
        }

        .dark {
            --tech-border: #60a5fa;
            --tech-bg: #0f172a;
            --tech-accent: #38bdf8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--tech-bg);
            transition: all 0.3s ease;
        }

        .tech-grid {
            border: 2px solid var(--tech-border);
        }

        .tech-cell {
            border: 1px solid var(--tech-border);
            padding: 0.5rem;
        }

        .tech-header {
            background: linear-gradient(180deg, #074e8c 0%, #033663 100%);
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .dark .tech-header {
            background: linear-gradient(180deg, #1e3a8a 0%, #172554 100%);
            color: #38bdf8;
        }

        #map {
            width: 100%;
            height: 100%;
            border: 1px solid var(--tech-border);
            background: #aad3df;
        }

        .map-wrapper {
            position: sticky;
            top: 70px;
            height: calc(100vh - 80px);
        }


        .fenomeno-card {
            transition: all 0.2s ease;
        }

        .fenomeno-card:hover {
            transform: translateX(5px);
            background-color: #fef2f2;
        }

        .fenomeno-card .fen-descripcion {
            font-size: 15px !important;
            font-weight: 400 !important;
        }

        .dark .fenomeno-card:hover {
            background-color: #450a0a;
        }

        .monospace {
            font-family: 'JetBrains Mono', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin: 4px 0; /* Creates separation from top and bottom */
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(7, 78, 140, 0.3); /* Subtle light mode variant */
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(7, 78, 140, 0.8); /* Brighter on hover in light mode */
        }

        /* Dark Mode Scrollbar Styling */
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3); /* Subtle dark mode variant (tech-accent) */
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.8); /* Brighter dark mode on hover */
        }


        /* Weather Markers */
        .weather-pin {
            background: transparent;
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 1), -1px -1px 2px rgba(255, 255, 255, 1);
        }

        .dark .weather-pin {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 1), -1px -1px 2px rgba(0, 0, 0, 1);
        }

        .weather-pin .icon {
            font-size: 1.8rem;
            line-height: 1;
            filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.3));
        }

        .weather-pin .temp {
            font-size: 0.85rem;
            font-weight: 400;
            /* Normal weight */
            color: #000;
            font-family: 'JetBrains Mono', monospace;
            margin-top: -2px;
        }

        .dark .weather-pin .temp {
            color: #fff;
        }

        .weather-pin .city-label {
            font-size: 0.75rem;
            font-weight: 400;
            /* Normal weight */
            color: #d00000;
            /* High contrast red */
            text-shadow: none;
            /* Removed halo */
        }

        .dark .weather-pin .city-label {
            color: #fca5a5;
            text-shadow: none;
        }

        /* Ajustes específicos para Vista Satélite (Mejor Contraste) */
        .sat-active .weather-pin .city-label {
            color: #ffff00 !important; /* Amarillo Intenso */
            text-shadow: 1px 1px 3px rgba(0,0,0,1), 0 0 4px rgba(0,0,0,0.5) !important;
            font-weight: 700 !important;
        }
        .sat-active .weather-pin .temp {
            color: #ffffff !important; /* Blanco */
            text-shadow: 1px 1px 3px rgba(0,0,0,1) !important;
            font-weight: 700 !important;
        }

        /* Animations */
        @keyframes pulse-red {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .pulse-alert {
            animation: pulse-red 2s infinite;
        }

        /* Botón 🎯 de reseteo del mapa */
        .leaflet-bar a {
            background-color: var(--tech-bg) !important;
            color: var(--tech-border) !important;
            border-bottom: 1px solid var(--tech-border) !important;
            border-radius: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 30px !important;
            height: 30px !important;
            line-height: 30px !important;
        }

        .leaflet-bar a:hover {
            background-color: var(--tech-accent) !important;
            color: white !important;
        }

        /* Animaciones del ícono meteorológico */
        @keyframes sun-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fog-drift {

            0%,
            100% {
                opacity: 0.5;
                transform: translateX(0);
            }

            50% {
                opacity: 1;
                transform: translateX(3px);
            }
        }

        @keyframes rain-drop {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(4px);
            }
        }

        @keyframes storm-flash {

            0%,
            89%,
            93%,
            97%,
            100% {
                filter: brightness(1);
            }

            90%,
            95% {
                filter: brightness(2.5) drop-shadow(0 0 6px white);
            }
        }

        @keyframes cloud-float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(4px, -3px);
            }
        }

        .fen-icon-sun {
            display: inline-block;
            animation: sun-spin 20s linear infinite;
        }

        .fen-icon-fog {
            display: inline-block;
            animation: fog-drift 3s ease-in-out infinite;
        }

        .fen-icon-rain {
            display: inline-block;
            animation: rain-drop 0.8s ease-in-out infinite;
        }

        .fen-icon-storm {
            display: inline-block;
            animation: storm-flash 4s step-end infinite;
        }

        .fen-icon-cloud {
            display: inline-block;
            animation: cloud-float 5s ease-in-out infinite;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--tech-border);
            background-color: transparent;
            color: var(--tech-border);
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-btn:hover {
            background-color: var(--tech-border);
            color: #ffffff !important;
        }

        .nav-btn.active {

            color: #ffffff !important;

            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
        }

        .nav-btn span {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        /* Menu Dropdown Styles */
        .nav-dropdown {
            position: relative;
            display: inline-block;
        }

        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--tech-bg);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 10000;
            border: 2px solid var(--tech-border);
            margin-top: 2px;
        }

        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }

        .nav-dropdown-item {
            color: var(--tech-border);
            padding: 8px 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .nav-dropdown-item:hover {
            background-color: var(--tech-border);
            color: white !important;
        }

        .dark .nav-dropdown-content {
            background-color: #0f172a;
        }
    </style>
</head>

        const peruBounds = [[-20.0, -85.0], [-0.0, -65.0]];
        
        // Capas Base
        const layerEsriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'ESRI Satellite',
            noWrap: true
        });

        const layerNoLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            noWrap: true
        });

        const map = L.map('map', {
            zoomSnap: 0.1,
            center: [-9.19, -75.01],
            zoom: 6,
            layers: [layerEsriSat] // Satélite por defecto
        });

        const baseMaps = {
            "Vista Satélite": layerEsriSat,
            "Sin Etiquetas (Claro)": layerNoLabels
        };

        L.control.layers(baseMaps, null, { collapsed: true, position: 'topright' }).addTo(map);

        // Control dinámico de estilos basado en la capa activa
        map.on('baselayerchange', function (e) {
            const mapEl = document.getElementById('map');
            if (e.name === "Vista Satélite") {
                mapEl.classList.add('sat-active');
            } else {
                mapEl.classList.remove('sat-active');
            }
        });
        // Inicializar con Satélite activo
        document.getElementById('map').classList.add('sat-active');


        const cityMarkers = {};

        cityData.forEach(city => {
            if (city.lat && parseFloat(city.lat) !== 0) {
                const tempVal = city.temp.replace(" °C", "°");

                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `
                        <div class="weather-pin">
                            <img src="${city.icon}" class="w-8 h-8 object-contain mb-1" onerror="this.style.display='none'">
                            <div class="city-label">${city.name}</div>
                            <div class="temp">${tempVal}</div>
                        </div>`,
                    iconSize: [100, 80],
                    iconAnchor: [50, 40]
                });
                const marker = L.marker([city.lat, city.lon], { icon: customIcon }).addTo(map);
                marker.bindPopup(`<b>${city.name}</b><br>Temperatura: ${city.temp}`);
                
                cityMarkers[city.name] = marker;
            }
        });

        // Function to zoom directly to a city when clicking on its card
        function zoomToCity(cityName) {
            const marker = cityMarkers[cityName];
            if (marker) {
                map.flyTo(marker.getLatLng(), 12, {
                    animate: true,
                    duration: 1.5
                });
                marker.openPopup();
                
                // Temporary visual highlight on the marker icon
                const icon = marker.getElement();
                if (icon) {
                    icon.style.filter = 'drop-shadow(0 0 15px yellow) brightness(1.2)';
                    setTimeout(() => {
                        icon.style.filter = '';
                    }, 3000);
                }
            }
        }

        function adjustView() {
            map.invalidateSize();
            // Boundaries of Peru, adjusted to fill more screen
            const bounds = [[-18.4, -81.3], [-0.0, -68.7]];
            map.fitBounds(bounds, { padding: [2, 2], animate: false });
        }

        // Initial adjustment
        setTimeout(adjustView, 100);
        // Double check a bit later
        setTimeout(adjustView, 500);
        // Triple check for safety
        setTimeout(adjustView, 1500);

        // PE Centering Button
        const homeControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                const btn = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                btn.innerHTML = '<a href="#" title="Reset View" class="map-home-btn" style="font-size: 16px;">🎯</a>';
                btn.onclick = function (e) {
                    e.preventDefault();
                    adjustView();
                };
                return btn;
            }
        });
        map.addControl(new homeControl());

        // Ícono meteorológico por fenómeno (misma lógica que el mapa)
        function getWeatherIcon(text) {
            const t = text.toLowerCase();
            if (t.includes('tormenta') || t.includes('ts') || t.includes('rayo') || t.includes('trueno')) return { emoji: '⛈️', cls: 'fen-icon-storm' };
            if (t.includes('lluvia') || t.includes('llovizna') || t.includes('ra') || t.includes('dz') || t.includes('chubasco') || t.includes('sh')) return { emoji: '🌧️', cls: 'fen-icon-rain' };
            if (t.includes('nieve') || t.includes('sn') || t.includes('granizo') || t.includes('gr')) return { emoji: '🌨️', cls: 'fen-icon-rain' };
            if (t.includes('niebla') || t.includes('neblina') || t.includes('fg') || t.includes('br') || t.includes('bruma')) return { emoji: '🌫️', cls: 'fen-icon-fog' };
            if (t.includes('polvo') || t.includes('po') || t.includes('arena') || t.includes('sa') || t.includes('ceniza') || t.includes('va') || t.includes('humo') || t.includes('fu') || t.includes('hz')) return { emoji: '💨', cls: 'fen-icon-fog' };
            if (t.includes('ventisca') || t.includes('bl') || t.includes('vendaval') || t.includes('viento')) return { emoji: '🌪️', cls: 'fen-icon-fog' };
            if (t.includes('cubierto') || t.includes('ovc')) return { emoji: '☁️', cls: 'fen-icon-cloud' };
            if (t.includes('nublado') || t.includes('bkn') || t.includes('parcial') || t.includes('sct') || t.includes('nubes')) return { emoji: '⛅', cls: 'fen-icon-cloud' };
            if (t.includes('despejado') || t.includes('skc') || t.includes('clr') || t.includes('cavok')) return { emoji: '☀️', cls: 'fen-icon-sun' };
            return { emoji: '☁️', cls: '' };
        }

        document.querySelectorAll('.fen-weather-icon').forEach(el => {
            const result = getWeatherIcon(el.dataset.fen || '');
            el.textContent = result.emoji;
            if (result.cls) el.classList.add(result.cls);
        });
    </script>
</body>

</html>
